[package]
name = "frozen-core"
edition = "2024"
version = "0.0.12"
exclude = ["shell.nix"]
license = "MIT OR Apache-2.0"
keywords = ["frozen-lab", "frozen-core"]
repository = "https://github.com/frozen-lab/frozen-core"
description = "Custom implementations and core utilities for frozen codebases"

[features]
crc32 = []
error = []
hints = []
mpscq = []
bpool = ["error"]
ffile = ["libc", "error", "hints"]
fmmap = ["libc", "error", "hints", "ffile"]
fpipe = ["error", "ffile", "bpool", "hints"]
default = ["crc32", "error", "hints", "ffile", "fmmap", "bpool", "fpipe", "mpscq"]

[target.'cfg(unix)'.dependencies]
libc = { version = "0.2.178", optional = true }

[target.'cfg(unix)'.dev-dependencies]
libc = "0.2.178"

[dev-dependencies]
tempfile = "3.20.0"
